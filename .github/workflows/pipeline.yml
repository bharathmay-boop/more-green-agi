# Phase 1 — the marketing agent on a schedule (replaces automation/crontab.example
# and the removed Redis worker). Path A: Vercel(web) + Neon(Postgres) + this cron.
#
# DORMANT until you opt in: scheduled runs only execute when repo variable
# PIPELINE_ENABLED == 'true' (Settings → Actions → Variables). Manual runs via
# "Run workflow" (workflow_dispatch) always work, for first-deploy smoke tests.
#
# Money-safety: AUTONOMY_MODE stays 'propose' — nothing raises spend without an
# approved approval_queue row. `apply-approved` is the only spend path and it
# re-checks caps; it runs often so an approval applies within minutes.
name: pipeline

on:
  workflow_dispatch:
    inputs:
      command:
        description: "main.py command to run (e.g. monitor-ads, apply-approved)"
        required: true
        default: monitor-ads
  schedule:
    - cron: "30 3 * * 1,3,5"   # 09:00 IST Mon/Wed/Fri — generate + post organic
    - cron: "30 12 * * *"      # 18:00 IST daily — monitor ads
    - cron: "30 13 * * *"      # 19:00 IST daily — attribution + strategize
    - cron: "0 4 * * *"        # 09:30 IST daily — sync orders
    - cron: "*/10 * * * *"     # every 10 min — apply approved proposals (cap-gated)
    - cron: "5 * * * *"        # hourly — expire pending proposals past their TTL

concurrency:
  group: pipeline-${{ github.event.schedule || github.event.inputs.command }}
  cancel-in-progress: false

jobs:
  run:
    name: run pipeline stage
    runs-on: ubuntu-latest
    # Dormant on schedule until explicitly enabled; manual dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.PIPELINE_ENABLED == 'true' }}
    defaults:
      run:
        working-directory: automation
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTONOMY_MODE: propose
      MAX_DAILY_SPEND_INR: ${{ vars.MAX_DAILY_SPEND_INR || '3000' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      BYTEPLUS_ARK_API_KEY: ${{ secrets.BYTEPLUS_ARK_API_KEY }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_APP_ID: ${{ secrets.META_APP_ID }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
      META_IG_ACCOUNT_ID: ${{ secrets.META_IG_ACCOUNT_ID }}
      META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
      META_CUSTOMER_AUDIENCE_ID: ${{ secrets.META_CUSTOMER_AUDIENCE_ID }}
      SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
      SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      FOUNDER_EMAIL: ${{ secrets.FOUNDER_EMAIL }}
      META_IG_HANDLE: ${{ secrets.META_IG_HANDLE }}
      INFLUENCER_SHEETS_ID: ${{ secrets.INFLUENCER_SHEETS_ID }}
      IG_MESSAGES_APPROVED: ${{ vars.IG_MESSAGES_APPROVED || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: automation/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Serverless has no file path for the Google service account — decode the
      # base64 secret to a temp file and point the file-path env var at it.
      - name: Materialise Google service account
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}" | base64 -d > "$RUNNER_TEMP/gsa.json"
            echo "GOOGLE_SERVICE_ACCOUNT_FILE=$RUNNER_TEMP/gsa.json" >> "$GITHUB_ENV"
          fi

      - name: Run stage
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            workflow_dispatch)
              python main.py "${{ github.event.inputs.command }}"
              ;;
            schedule)
              case "${{ github.event.schedule }}" in
                "30 3 * * 1,3,5")
                  python main.py generate-prompts
                  python main.py generate-creatives
                  python main.py post-organic --platform both
                  python main.py post-youtube
                  ;;
                "30 12 * * *") python main.py monitor-ads ;;
                "30 13 * * *") python main.py compute-attribution; python main.py strategize ;;
                "0 4 * * *")   python main.py sync-orders ;;
                "*/10 * * * *") python main.py apply-approved ;;
                "5 * * * *")    python main.py expire-approvals ;;
              esac
              ;;
          esac
