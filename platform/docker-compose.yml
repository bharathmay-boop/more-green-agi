# More Green platform — local infrastructure (E1-T1)
# Postgres 16 (Prisma data store) + Redis 7 (queue/cache).
# Values default to local-dev creds; override via environment / .env if present.

services:
  postgres:
    image: postgres:16
    container_name: moregreen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moregreen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moregreen}
      POSTGRES_DB: ${POSTGRES_DB:-moregreen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moregreen} -d ${POSTGRES_DB:-moregreen}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: moregreen-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
